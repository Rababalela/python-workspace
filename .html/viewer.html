<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BookScraper – Results Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8c97a;
    --accent2: #7ac9e8;
    --text: #f0ede6;
    --muted: #888;
    --green: #6fcf97;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 3rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  .stats-bar {
    display: flex;
    gap: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
  }

  .stat { text-align: right; }
  .stat-val { font-size: 1.6rem; font-weight: 500; color: var(--accent); line-height: 1; }
  .stat-label { color: var(--muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; }

  .controls {
    padding: 1.5rem 3rem;
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    border-radius: 4px;
    outline: none;
    width: 260px;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:focus { border-color: var(--accent); }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .count-badge {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .count-badge span { color: var(--accent2); }

  main { padding: 2rem 3rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
    transition: border-color 0.2s, transform 0.15s;
    animation: fadeIn 0.3s ease both;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .price {
    font-family: 'DM Mono', monospace;
    font-size: 1.15rem;
    font-weight: 500;
    color: var(--accent);
  }

  .stars { color: var(--accent); font-size: 0.85rem; letter-spacing: 1px; }
  .stars .empty { color: var(--border); }

  .avail {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--green);
    background: rgba(111,207,151,0.08);
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
  }

  .empty-state {
    text-align: center;
    padding: 5rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
  }

  .source-note {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .tag {
    background: rgba(232,201,122,0.08);
    border: 1px solid rgba(232,201,122,0.2);
    color: var(--accent);
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    font-size: 0.65rem;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Book<span>Scraper</span></div>
    <div class="subtitle">books.toscrape.com · Python + BeautifulSoup</div>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="totalCount">0</div>
      <div class="stat-label">Books</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="avgRating">0</div>
      <div class="stat-label">Avg Rating</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="avgPrice">£0</div>
      <div class="stat-label">Avg Price</div>
    </div>
  </div>
</header>

<div class="controls">
  <span class="filter-label">Filter</span>
  <input type="text" id="searchInput" placeholder="Search by title…" oninput="render()"/>
  <select id="ratingFilter" onchange="render()">
    <option value="0">All Ratings</option>
    <option value="5">★★★★★ (5)</option>
    <option value="4">★★★★☆ (4+)</option>
    <option value="3">★★★☆☆ (3+)</option>
  </select>
  <select id="sortFilter" onchange="render()">
    <option value="default">Sort: Default</option>
    <option value="price-asc">Price: Low → High</option>
    <option value="price-desc">Price: High → Low</option>
    <option value="rating-desc">Rating: High → Low</option>
    <option value="title-asc">Title: A → Z</option>
  </select>
  <div class="count-badge">Showing <span id="showingCount">0</span> results</div>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="source-note">
    <span>Source: books.toscrape.com · Scraped with Python requests + BeautifulSoup4</span>
    <span>
      <span class="tag">scraper.py</span>
      <span class="tag">books.csv</span>
      <span class="tag">books.json</span>
    </span>
  </div>
</main>

<script>
const BOOKS = [
  {"title": "A Light in the Attic", "price": "£51.77", "rating": 3, "availability": "In stock"},
  {"title": "Tipping the Velvet", "price": "£53.74", "rating": 1, "availability": "In stock"},
  {"title": "Soumission", "price": "£50.10", "rating": 1, "availability": "In stock"},
  {"title": "Sharp Objects", "price": "£47.82", "rating": 4, "availability": "In stock"},
  {"title": "Sapiens: A Brief History of Humankind", "price": "£54.23", "rating": 5, "availability": "In stock"},
  {"title": "The Requiem Red", "price": "£22.65", "rating": 1, "availability": "In stock"},
  {"title": "The Dirty Little Secrets of Getting Your Dream Job", "price": "£33.34", "rating": 4, "availability": "In stock"},
  {"title": "The Coming Woman", "price": "£17.93", "rating": 3, "availability": "In stock"},
  {"title": "The Boys in the Boat", "price": "£22.60", "rating": 4, "availability": "In stock"},
  {"title": "The Black Maria", "price": "£52.15", "rating": 1, "availability": "In stock"},
  {"title": "Starving Hearts", "price": "£13.99", "rating": 2, "availability": "In stock"},
  {"title": "Shakespeare's Sonnets", "price": "£20.66", "rating": 4, "availability": "In stock"},
  {"title": "Set Me Free", "price": "£17.46", "rating": 5, "availability": "In stock"},
  {"title": "Scott Pilgrim's Precious Little Life", "price": "£52.29", "rating": 5, "availability": "In stock"},
  {"title": "Rip it Up and Start Again", "price": "£35.02", "rating": 5, "availability": "In stock"},
  {"title": "Our Band Could Be Your Life", "price": "£57.25", "rating": 3, "availability": "In stock"},
  {"title": "Olio", "price": "£23.88", "rating": 1, "availability": "In stock"},
  {"title": "Mesaerion: The Best Science Fiction Stories", "price": "£37.59", "rating": 1, "availability": "In stock"},
  {"title": "Libertarianism for Beginners", "price": "£51.33", "rating": 2, "availability": "In stock"},
  {"title": "It's Only the Himalayas", "price": "£45.17", "rating": 2, "availability": "In stock"}
];

function stars(n) {
  return Array.from({length:5}, (_,i) =>
    `<span class="${i < n ? '' : 'empty'}">★</span>`
  ).join('');
}

function parsePrice(p) { return parseFloat(p.replace('£','')); }

function updateStats(books) {
  document.getElementById('totalCount').textContent = BOOKS.length;
  const avg = books.reduce((s,b) => s + b.rating, 0) / (books.length || 1);
  document.getElementById('avgRating').textContent = avg.toFixed(1);
  const avgP = books.reduce((s,b) => s + parsePrice(b.price), 0) / (books.length || 1);
  document.getElementById('avgPrice').textContent = '£' + avgP.toFixed(0);
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const minRating = parseInt(document.getElementById('ratingFilter').value);
  const sort = document.getElementById('sortFilter').value;

  let books = BOOKS.filter(b =>
    b.title.toLowerCase().includes(q) && b.rating >= minRating
  );

  if (sort === 'price-asc') books.sort((a,b) => parsePrice(a.price) - parsePrice(b.price));
  else if (sort === 'price-desc') books.sort((a,b) => parsePrice(b.price) - parsePrice(a.price));
  else if (sort === 'rating-desc') books.sort((a,b) => b.rating - a.rating);
  else if (sort === 'title-asc') books.sort((a,b) => a.title.localeCompare(b.title));

  document.getElementById('showingCount').textContent = books.length;
  updateStats(books);

  const grid = document.getElementById('grid');
  if (!books.length) {
    grid.innerHTML = '<div class="empty-state">No books match your filters.</div>';
    return;
  }

  grid.innerHTML = books.map((b, i) => `
    <div class="card" style="animation-delay:${i * 30}ms">
      <div class="card-title">${b.title}</div>
      <div class="card-meta">
        <div class="price">${b.price}</div>
        <div class="stars">${stars(b.rating)}</div>
      </div>
      <div><span class="avail">${b.availability}</span></div>
    </div>
  `).join('');
}

render();
</script>
</body>
</html>
